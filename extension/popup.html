<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>Brave Performance</title>
  </head>
  <body>
    <header>
      <h1>Brave Performance</h1>
      <span class="ver">v0.1</span>
    </header>

    <section class="card">
      <h2>System</h2>
      <div class="row"><span>CPU</span><b id="cpu">…</b></div>
      <div class="row"><span>Memory used</span><b id="mem">…</b></div>
    </section>

    <section class="card">
      <h2>This page</h2>
      <div class="row"><span>LCP</span><b id="lcp">…</b></div>
      <div class="row"><span>CLS</span><b id="cls">…</b></div>
      <div class="row"><span>INP (max)</span><b id="inp">…</b></div>
      <div class="row"><span>TTFB</span><b id="ttfb">…</b></div>
    </section>

    <section class="card" id="yt-card">
      <h2>YouTube</h2>
      <div class="row"><span>Codec</span><b id="yt-codec">—</b></div>
      <div class="row"><span>Dropped frames</span><b id="yt-drops">—</b></div>
      <label class="toggle">
        <input type="checkbox" id="force-h264" />
        <span>Force H.264 (engage hardware decode)</span>
      </label>
      <p class="hint" id="yt-hint">Lowers CPU on GPUs without AV1/VP9 hardware decode. Caps some videos at 1080p; reload YouTube after toggling.</p>
    </section>

    <footer>
      <span class="hint">Browser-wide tuning: run <code>node cli/index.js audit</code></span>
    </footer>
    <script src="popup.js"></script>
  </body>
</html>
